# Enforce that every fenced code block in a .lit.md file has a file= annotation.
# Plain ``` blocks without {.lang file=...} are invisible to entangled and produce
# no output — they silently disappear. This is almost always a mistake.
#
# Correct:
#   ``` {.typescript file=_generated/foo.ts}
#   export const x = 1;
#   ```
#
# Wrong (entangled ignores this block):
#   ```typescript
#   export const x = 1;
#   ```
#
# NOTE: ast-grep does not natively parse Markdown fences. This rule operates on
# the raw text structure. For robust enforcement, use the Python linter script
# (linter/check-lit-md.py) which is Markdown-aware.
#
# This YAML rule serves as documentation of the policy; the Python script enforces it.
id: no-code-block-without-file-annotation
language: markdown
severity: error
message: "Every code block in a .lit.md file must have a file= annotation: ``` {.lang file=path/to/output.ts}"
note: |
  Entangled only processes code blocks with {.lang file=path} annotations.
  Plain ```lang blocks are silently ignored — they produce no output and
  make the literate document misleading. Either add a file= annotation or
  convert the block to prose with an inline code snippet.
rule:
  pattern: "```$LANG\n$$$BODY\n```"
files:
  - "**/*.lit.md"

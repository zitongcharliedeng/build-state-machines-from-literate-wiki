# Prose belongs between code blocks, not as comments inside them.
# TypeScript comments inside .lit.md code blocks defeat the purpose of literate
# programming: the narrative should live in Markdown prose, not // comments.
#
# This is a direct parallel of gridinstruments' no-ts-comments rule, but targeting
# the .lit.md source files rather than the generated .ts output.
#
# Correct pattern — prose between blocks:
#   ``` {.typescript file=_generated/foo.ts}
#   const a = computeValue();
#   ```
#
#   Explain WHY here in prose. Entangled concatenates consecutive blocks.
#
#   ``` {.typescript file=_generated/foo.ts}
#   const b = a * FACTOR;
#   ```
#
# Wrong:
#   ``` {.typescript file=_generated/foo.ts}
#   // This computes the value because...   ← USE PROSE INSTEAD
#   const a = computeValue();
#   ```
#
# NOTE: See linter/check-lit-md.py for the Python enforcement implementation.
id: no-ts-comments-in-lit-md
language: markdown
severity: error
message: "Use literate prose instead of // comments inside .lit.md code blocks"
note: |
  End the code block, write markdown prose explaining the why, then resume
  the code block. Entangled concatenates multiple blocks targeting the same
  file in document order. This is the core literate programming pattern.
  See: https://entangled.github.io/entangled/#multiple-code-blocks
rule:
  regex: "^\\s*(//|/\\*|\\*)"
  inside:
    pattern: "``` {$$$}\n$$$BODY\n```"
files:
  - "**/*.lit.md"
